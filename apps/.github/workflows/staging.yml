name: Staging Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - staging

jobs:
  staging:
    name: Staging Quality and Deploy
    runs-on: ubuntu-latest
    env:
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      VERCEL_STAGING_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_STAGING_DEPLOY_HOOK_URL }}
      BACKEND_STAGING_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_STAGING_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required deploy secrets
        run: |
          test -n "$STAGING_DATABASE_URL"
          test -n "$VERCEL_STAGING_DEPLOY_HOOK_URL"
          test -n "$BACKEND_STAGING_DEPLOY_HOOK_URL"

      - name: Generate Prisma Client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Validate Prisma Schema
        run: pnpm exec prisma validate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Quality Check
        run: pnpm check

      - name: API Tests
        run: pnpm test:api

      - name: Build
        run: pnpm build:staging

      - name: Deploy Frontend by Vercel Hook
        run: curl -fsS -X POST "$VERCEL_STAGING_DEPLOY_HOOK_URL"

      - name: Deploy Backend by Provider Hook
        run: curl -fsS -X POST "$BACKEND_STAGING_DEPLOY_HOOK_URL"
